<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    .slide-number { color:var(--secondary); }
    .empower { font-size:52px; font-weight:800; line-height:1.18; letter-spacing:-1px; color:var(--primary); }
    .empower .highlight { color:var(--accent); }
    .criterio { margin-top:48px; font-size:34px; font-weight:600; line-height:1.4; color:var(--foreground); }
    .criterio strong { color:var(--primary); }
    .one-person { display:flex; align-items:center; gap:24px; margin-bottom:44px; }
    .one-person .num { font-size:96px; font-weight:800; color:var(--accent); line-height:1; letter-spacing:-3px; }
    .one-person .lab { font-size:30px; font-weight:700; color:var(--secondary); line-height:1.15; }
  </style>
</head>
<body>
  <div class="slide-container slide--content">
    <span class="slide-number">06 / 07</span>

    <div class="spacer"></div>

    <div class="one-person">
      <span class="num">1</span>
      <span class="lab">funcionário<br>já é suficiente</span>
    </div>

    <p class="empower">Empresas com 1 funcionário <span class="highlight">vencem licitações todo dia.</span></p>
    <p class="criterio">O tamanho não é o critério — o <strong>preço</strong> e a <strong>documentação</strong> são.</p>

    <div class="spacer"></div>

    <div class="logo-area">
      <img src="logo.png" alt="Licitah" width="44" height="44">
      <span class="logo-word" style="color:var(--primary);">licitah</span>
    </div>
  </div>
</body>
</html>
