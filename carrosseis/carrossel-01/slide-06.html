<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="ed" style="background:var(--background);">
    <!-- Bloco de foto (metade esquerda) -->
    <div class="pblock" style="top:0; left:0; width:486px; height:1180px; border-radius:0 0 32px 0;">
      <img src="img/dono.jpg" alt="Dono de pequena empresa">
      <div style="position:absolute; left:36px; top:40px;"><span class="kicker kicker--orange">👤 1 funcionário</span></div>
    </div>

    <!-- Painel de texto (metade direita) -->
    <div style="position:absolute; left:548px; right:84px; top:150px;">
      <div class="accent-bar" style="margin-bottom:34px;"></div>
      <h2 style="font-size:52px; font-weight:800; line-height:1.12; letter-spacing:-1.5px; color:var(--primary);">
        Empresas com 1 funcionário <span style="color:var(--accent);">vencem licitações todo&nbsp;dia.</span>
      </h2>
      <p style="font-size:30px; font-weight:600; line-height:1.4; color:var(--foreground); margin-top:30px;">
        O tamanho não é o critério — o <strong style="color:var(--primary);">preço</strong> e a <strong style="color:var(--primary);">documentação</strong> são.
      </p>
      <div style="margin-top:40px; display:inline-flex; align-items:center; gap:14px; background:#E9F7EE; color:#259F46; font-size:24px; font-weight:800; padding:16px 26px; border-radius:14px;">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#259F46" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        Microempresa também vence
      </div>
    </div>

    <div class="footer footer--dark">
      <div class="brand"><img src="logo.png" alt="Licitah"><span class="bw">licitah</span><span class="handle">@licitah</span></div>
      <div class="nav">
        <div class="progress"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i></i></div>
        <span class="pageno">06 / 07</span>
      </div>
    </div>
  </div>
</body>
</html>
