<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    .content-z { position:relative; z-index:2; display:flex; flex-direction:column; height:100%; padding:96px 90px; }
    .tag-1 {
      display:inline-flex; align-items:center; gap:14px; align-self:flex-start;
      background:var(--accent); color:#fff; font-size:24px; font-weight:800;
      padding:14px 26px; border-radius:999px; letter-spacing:0.5px;
    }
    .empower { font-size:54px; font-weight:800; line-height:1.15; letter-spacing:-1px; text-shadow:0 2px 20px rgba(0,0,0,0.45); }
    .empower .highlight { color:#FF8533; }
    .criterio { margin-top:24px; font-size:30px; font-weight:600; line-height:1.4; text-shadow:0 2px 16px rgba(0,0,0,0.4); }
    .criterio strong { color:#FF8533; }
  </style>
</head>
<body>
  <div class="slide-container slide--cover" style="padding:0;">
    <div class="photo-bg">
      <img src="img/dono.jpg" alt="Dono de pequena empresa">
      <div class="dt-mult" style="opacity:0.85;"></div>
      <div class="dt-screen"></div>
      <div class="dt-legib"></div>
    </div>

    <div class="content-z">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="tag-1">👤 1 funcionário</span>
        <span class="slide-number" style="position:static; color:rgba(255,255,255,0.65);">06 / 07</span>
      </div>

      <div class="spacer"></div>

      <p class="empower">Empresas com 1 funcionário <span class="highlight">vencem licitações todo dia.</span></p>
      <p class="criterio">O tamanho não é o critério — o <strong>preço</strong> e a <strong>documentação</strong> são.</p>

      <div style="height:52px;"></div>

      <div class="logo-area">
        <img src="logo.png" alt="Licitah" width="44" height="44">
        <span class="logo-word" style="color:#fff;">licitah</span>
      </div>
    </div>
  </div>
</body>
</html>
