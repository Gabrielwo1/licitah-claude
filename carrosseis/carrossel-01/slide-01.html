<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    .cover-eyebrow { display:flex; align-items:center; gap:20px; margin-bottom:36px; }
    .cover-eyebrow .accent-bar { margin:0; }
    .cover-headline { font-size:66px; font-weight:800; line-height:1.08; letter-spacing:-1.5px; text-shadow:0 2px 24px rgba(0,0,0,0.35); }
    .cover-sub { margin-top:36px; text-shadow:0 2px 16px rgba(0,0,0,0.35); }
    .content-z { position:relative; z-index:2; display:flex; flex-direction:column; height:100%; }
    .logo-chip { background:#FFFFFF; border-radius:999px; padding:14px 26px 14px 16px; display:flex; align-items:center; gap:14px; }
    .logo-chip img { width:52px; height:52px; }
    .logo-chip .logo-word { color:var(--primary); font-size:28px; font-weight:800; }
  </style>
</head>
<body>
  <div class="slide-container slide--cover" style="padding:0;">
    <div class="photo-bg">
      <img src="img/congresso.jpg" alt="Congresso Nacional">
      <div class="dt-mult"></div>
      <div class="dt-screen"></div>
      <div class="dt-accent"></div>
      <div class="dt-legib"></div>
    </div>

    <div class="content-z" style="padding:96px 90px;">
      <div class="cover-eyebrow">
        <span class="accent-bar"></span>
        <span class="eyebrow">Vender para o governo</span>
      </div>

      <div class="spacer"></div>

      <h1 class="cover-headline">
        O mercado que <span class="highlight">paga em dia</span>, não cancela e ainda publica o que precisa comprar online.
      </h1>
      <p class="subheadline cover-sub">E 90% das empresas nem sabe que pode entrar.</p>

      <div style="height:48px;"></div>

      <div style="display:flex; align-items:center; justify-content:space-between;">
        <div class="swipe-hint">
          Arrasta pro lado
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#FF6600" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </div>
        <div class="logo-chip">
          <img src="logo.png" alt="Licitah">
          <span class="logo-word">licitah</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
