<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    .lead { font-size:56px; font-weight:800; line-height:1.18; letter-spacing:-1px; color:var(--primary); }
    .lead .nome { background:var(--primary); color:#fff; padding:2px 18px; border-radius:14px; display:inline-block; }
    .reforco { margin-top:48px; font-size:36px; font-weight:600; line-height:1.35; color:var(--foreground); }
  </style>
</head>
<body>
  <div class="slide-container slide--content">
    <span class="slide-number" style="color:var(--secondary);">04 / 07</span>

    <div class="spacer"></div>

    <div class="accent-bar" style="margin-bottom:44px;"></div>
    <p class="lead">Isso tem nome: <span class="nome">licitação pública</span>.</p>
    <p class="reforco">E tem edital aberto <span class="highlight">agora</span> para o seu setor.</p>

    <div class="spacer"></div>

    <div class="logo-area">
      <img src="logo.png" alt="Licitah" width="44" height="44">
      <span class="logo-word" style="color:var(--primary);">licitah</span>
    </div>
  </div>
</body>
</html>
