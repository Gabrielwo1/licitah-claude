<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    .big-number { font-size:168px; font-weight:800; line-height:0.95; letter-spacing:-5px; color:var(--accent); }
    .big-number small { display:block; font-size:42px; font-weight:700; letter-spacing:-1px; color:var(--primary); margin-bottom:10px; }
    .num-body { margin-top:56px; max-width:880px; }
    .slide-number { color:var(--secondary); }
  </style>
</head>
<body>
  <div class="slide-container slide--content">
    <span class="slide-number">02 / 07</span>

    <div class="spacer"></div>

    <div class="accent-bar" style="margin-bottom:40px;"></div>
    <div class="big-number"><small>Mais de</small>R$100 bilhões</div>

    <p class="body-text num-body">
      Em 2024, o governo brasileiro comprou mais de <strong>R$100 bilhões</strong> em produtos e serviços. De empresas <span class="highlight">como a sua</span>.
    </p>

    <div class="spacer"></div>

    <div class="logo-area">
      <img src="logo.png" alt="Licitah" width="44" height="44">
      <span class="logo-word" style="color:var(--primary);">licitah</span>
    </div>
  </div>
</body>
</html>
