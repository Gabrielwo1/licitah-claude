<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="ed" style="background:#0a1175;">
    <!-- Bloco de foto (faixa direita) -->
    <div class="pblock" style="top:0; right:0; width:420px; height:1350px;">
      <img src="img/dinheiro.jpg" alt="Cédulas de R$100">
      <div style="position:absolute; inset:0; background:linear-gradient(90deg, #0a1175 0%, rgba(10,17,117,0.35) 45%, rgba(10,17,117,0) 100%);"></div>
    </div>

    <!-- Conteúdo -->
    <div style="position:absolute; left:84px; top:96px; width:600px; color:#fff;">
      <span class="kicker kicker--orange">O dado</span>
      <div style="font-size:26px; font-weight:600; opacity:0.8; margin:36px 0 6px;">Em 2024, o governo brasileiro comprou</div>
      <div style="font-size:128px; font-weight:800; line-height:0.95; letter-spacing:-4px; color:#FF8533;">R$100<br>bilhões</div>
      <p class="p-lead" style="margin-top:26px; opacity:0.9; max-width:540px;">Em produtos e serviços — de empresas <strong style="color:#FF8533;">como a sua</strong>.</p>

      <div style="font-size:19px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; opacity:0.65; margin:40px 0 16px;">Editais abertos agora · Licitah</div>
      <div class="ui-list" style="max-width:600px;">
        <div class="ui-row">
          <span class="ir-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#0a1175" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></span>
          <span class="ir-main"><span class="ir-title">Material de escritório</span><span class="ir-sub">Pref. de Campinas · SP</span></span>
          <span class="ir-val">R$ 850 mil</span>
        </div>
        <div class="ui-row">
          <span class="ir-ico"><svg viewBox="0 0 24 24" fill="none" stroke="#0a1175" stroke-width="2"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg></span>
          <span class="ir-main"><span class="ir-title">Equipamentos de TI</span><span class="ir-sub">Univ. Federal · BA</span></span>
          <span class="ir-val">R$ 1,2 mi</span>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer footer--light">
      <div class="brand"><img src="logo.png" alt="Licitah"><span class="bw">licitah</span><span class="handle">@licitah</span></div>
      <div class="nav">
        <div class="progress"><i class="on"></i><i class="on"></i><i></i><i></i><i></i><i></i><i></i></div>
        <span class="pageno">02 / 07</span>
      </div>
    </div>
  </div>
</body>
</html>
