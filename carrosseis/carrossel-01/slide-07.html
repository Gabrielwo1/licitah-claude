<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="ed" style="background:linear-gradient(160deg,#FF7714 0%,#E25500 100%);">
    <div class="ed-index" style="top:-40px; right:20px; font-size:280px; color:rgba(255,255,255,0.12);">07</div>

    <!-- Ícone de bookmark gigante de fundo -->
    <svg viewBox="0 0 24 24" style="position:absolute; right:-60px; bottom:120px; width:560px; height:560px; fill:rgba(255,255,255,0.10); z-index:1;"><path d="M6 2a2 2 0 0 0-2 2v18l8-5.5 8 5.5V4a2 2 0 0 0-2-2H6z"/></svg>

    <div style="position:absolute; left:84px; right:84px; top:120px; color:#fff; z-index:3;">
      <span class="kicker" style="background:#0a1175; color:#fff;">Próximo passo</span>
      <h2 style="font-size:96px; font-weight:800; line-height:0.98; letter-spacing:-3px; margin-top:36px;">Salve esse post.</h2>
      <p style="font-size:34px; font-weight:600; line-height:1.35; margin-top:28px; max-width:840px;">
        Na semana que vem: <strong style="font-weight:800;">como encontrar o primeiro edital do seu setor.</strong>
      </p>
    </div>

    <!-- Bloco de alerta -->
    <div style="position:absolute; left:84px; right:140px; top:640px; z-index:3; transform:rotate(-1.5deg);">
      <div class="ui-alert">
        <span class="ua-bell"><svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2a6 6 0 0 0-6 6c0 5-2 7-2 7h16s-2-2-2-7a6 6 0 0 0-6-6zM10 21a2 2 0 0 0 4 0"/></svg></span>
        <div>
          <div class="ua-title">🔔 Novo edital pro seu setor!</div>
          <div class="ua-text">Pregão Eletrônico nº 90012/2026 — Prefeitura de Campinas/SP · abre em 3 dias</div>
        </div>
      </div>
    </div>

    <!-- Chip de logo -->
    <div style="position:absolute; left:84px; top:860px; z-index:3;">
      <div style="background:#fff; border-radius:999px; padding:18px 36px 18px 20px; display:inline-flex; align-items:center; gap:16px; box-shadow:0 20px 50px rgba(0,0,0,0.22);">
        <img src="logo.png" alt="Licitah" style="width:60px; height:60px;">
        <span style="color:var(--accent); font-size:38px; font-weight:800;">licitah</span>
      </div>
    </div>

    <div class="footer footer--light">
      <div class="brand"><img src="logo.png" alt="Licitah"><span class="bw">licitah</span><span class="handle">@licitah</span></div>
      <div class="nav">
        <div class="progress"><i style="background:#0a1175"></i><i style="background:#0a1175"></i><i style="background:#0a1175"></i><i style="background:#0a1175"></i><i style="background:#0a1175"></i><i style="background:#0a1175"></i><i style="background:#0a1175"></i></div>
        <span class="pageno">07 / 07</span>
      </div>
    </div>
  </div>
</body>
</html>
