<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    .quote-mark { font-size:200px; font-weight:800; line-height:0.6; color:rgba(255,102,0,0.25); height:120px; }
    .reflex { font-size:50px; font-weight:700; line-height:1.3; letter-spacing:-0.5px; }
    .reflex .highlight { color:var(--accent); }
    .glow2 { position:absolute; width:680px; height:680px; left:-240px; bottom:-260px;
             background:radial-gradient(circle, rgba(255,102,0,0.22) 0%, rgba(255,102,0,0) 70%); }
  </style>
</head>
<body>
  <div class="slide-container slide--cover">
    <div class="glow2"></div>
    <span class="slide-number" style="color:rgba(255,255,255,0.55);">05 / 07</span>

    <div class="spacer"></div>

    <div class="quote-mark">“</div>
    <p class="reflex">
      O problema <span class="highlight">não é a burocracia</span>. É que ninguém te contou que isso existe — e que você pode disputar.
    </p>

    <div class="spacer"></div>

    <div class="logo-area">
      <img src="logo.png" alt="Licitah" width="44" height="44">
      <span class="logo-word" style="color:#fff;">licitah</span>
    </div>
  </div>
</body>
</html>
