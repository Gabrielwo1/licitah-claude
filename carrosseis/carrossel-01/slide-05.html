<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
</head>
<body>
  <div class="ed" style="background:#0a1175;">
    <!-- Foto natural ocupando o bloco -->
    <div class="pblock" style="top:0; left:0; right:0; height:1350px;">
      <img src="img/docs.jpg" alt="Empreendedor analisando documentos">
      <div class="grad-b"></div>
      <div class="grad-t"></div>
    </div>

    <div style="position:absolute; top:80px; left:84px;">
      <span class="kicker kicker--ghost">A real verdade</span>
    </div>

    <!-- Pull-quote sobreposto -->
    <div style="position:absolute; left:84px; right:160px; bottom:200px;">
      <div class="pull">
        <div style="font-size:120px; font-weight:800; color:var(--accent); line-height:0.4; height:60px;">“</div>
        <p style="font-size:46px; font-weight:700; line-height:1.28; letter-spacing:-0.5px;">
          O problema <span style="color:#FF8533;">não é a burocracia</span>. É que ninguém te contou que isso existe — e que você pode disputar.
        </p>
      </div>
    </div>

    <div class="footer footer--light">
      <div class="brand"><img src="logo.png" alt="Licitah"><span class="bw">licitah</span><span class="handle">@licitah</span></div>
      <div class="nav">
        <div class="progress"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i></i><i></i></div>
        <span class="pageno">05 / 07</span>
      </div>
    </div>
  </div>

</html>
