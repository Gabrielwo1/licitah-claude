<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="components.css">
  <style>
    .content-z { position:relative; z-index:2; display:flex; flex-direction:column; height:100%; padding:96px 90px; }
    .quote-mark { font-size:180px; font-weight:800; line-height:0.5; color:rgba(255,102,0,0.55); height:96px; }
    .reflex { font-size:50px; font-weight:700; line-height:1.3; letter-spacing:-0.5px; text-shadow:0 2px 20px rgba(0,0,0,0.4); }
    .reflex .highlight { color:#FF8533; }
  </style>
</head>
<body>
  <div class="slide-container slide--cover" style="padding:0;">
    <div class="photo-bg">
      <img src="img/docs.jpg" alt="Empreendedor lendo documentos">
      <div class="dt-mult"></div>
      <div class="dt-screen"></div>
      <div class="dt-legib"></div>
    </div>

    <div class="content-z">
      <span class="slide-number" style="color:rgba(255,255,255,0.6);">05 / 07</span>

      <div class="spacer"></div>

      <div class="quote-mark">“</div>
      <p class="reflex">
        O problema <span class="highlight">não é a burocracia</span>. É que ninguém te contou que isso existe — e que você pode disputar.
      </p>

      <div style="height:52px;"></div>

      <div class="logo-area">
        <img src="logo.png" alt="Licitah" width="44" height="44">
        <span class="logo-word" style="color:#fff;">licitah</span>
      </div>
    </div>
  </div>
</body>
</html>
